<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Photocopy byKDM</title>
  
  <!-- Load TailwindCSS & React via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: black; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Script Aplikasi -->
  <script type="text/babel">
    const { useState, useRef } = React;
    
    // Icon SVG Components
    const Upload = ({ size = 20 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>);
    const Download = ({ size = 20 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>);
    const ImageIcon = ({ size = 56, className }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>);
    const SplitSquareHorizontal = ({ size = 18, className }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>);
    const Sliders = ({ size = 14, className }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="2" y1="14" x2="6" y2="14"/><line x1="10" y1="8" x2="14" y2="8"/><line x1="18" y1="16" x2="22" y2="16"/></svg>);

    const App = () => {
      const [image, setImage] = useState(null);
      const [splitPos, setSplitPos] = useState(50);
      
      const defaultFilters = { brightness: 100, contrast: 100, saturate: 100, sepia: 0, hueRotate: 0, blur: 0, sharpen: 0 };
      
      const cinematicPreset = { brightness: 105, contrast: 125, saturate: 115, sepia: 15, hueRotate: -5, blur: 0, sharpen: 40 };
      const bwCinematicPreset = { brightness: 105, contrast: 140, saturate: 0, sepia: 0, hueRotate: 0, blur: 0, sharpen: 75 };
      
      // HD Detail Preset (Diperbarui): Penajaman dikurangi agar tidak grainy, kontras & saturasi diseimbangkan agar jernih & HD
      const hdDetailPreset = { brightness: 103, contrast: 112, saturate: 105, sepia: 0, hueRotate: 0, blur: 0, sharpen: 35 };

      const [filters, setFilters] = useState(defaultFilters);
      const canvasRef = useRef(null);

      const getFilterString = (f) => {
        let baseFilter = `brightness(${f.brightness}%) contrast(${f.contrast}%) saturate(${f.saturate}%) sepia(${f.sepia}%) hue-rotate(${f.hueRotate}deg) blur(${f.blur}px)`;
        if (f.sharpen > 0) baseFilter += ` url(#sharpen-filter)`;
        return baseFilter;
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            setImage(event.target.result);
            setFilters(defaultFilters);
            setSplitPos(50);
          };
          reader.readAsDataURL(file);
        }
      };

      const applyPreset = (preset) => {
        setFilters(preset);
      };

      const handleFilterChange = (name, value) => setFilters(prev => ({ ...prev, [name]: value }));

      const downloadImage = () => {
        if (!image) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.filter = getFilterString(filters);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          try {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            link.download = 'photocopy-kdm-result.jpg';
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          } catch (e) {
            alert("Gagal menyimpan gambar. Pastikan browser mengizinkan unduhan.");
          }
        };
        img.src = image;
      };

      return (
        <div className="h-[100dvh] w-full bg-black text-neutral-100 font-sans flex flex-col overflow-hidden md:max-w-[430px] md:mx-auto relative md:border-x md:border-neutral-800 shadow-2xl">
          <svg style={{ position: 'absolute', width: 0, height: 0 }} aria-hidden="true">
            <filter id="sharpen-filter">
              <feConvolveMatrix order="3" preserveAlpha="true" kernelMatrix={`0 -${filters.sharpen / 100} 0 -${filters.sharpen / 100} ${1 + 4 * (filters.sharpen / 100)} -${filters.sharpen / 100} 0 -${filters.sharpen / 100} 0`} />
            </filter>
          </svg>

          <header className="bg-neutral-900/90 backdrop-blur-md flex items-center justify-between px-4 py-2 z-20 border-b border-neutral-800/60 shrink-0" style={{ paddingTop: 'max(env(safe-area-inset-top), 12px)' }}>
            <div className="flex items-center gap-2">
              <h1 className="text-base font-bold tracking-tight">Photocopy <span className="text-neutral-400 font-normal">byKDM</span></h1>
            </div>
            <div className="flex gap-4">
              <label className="flex flex-col items-center justify-center text-neutral-300 hover:text-white transition-colors cursor-pointer active:scale-95">
                <Upload size={20} />
                <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
              </label>
              <button onClick={downloadImage} disabled={!image} className={`flex flex-col items-center justify-center transition-colors active:scale-95 ${image ? 'text-blue-500 hover:text-blue-400' : 'text-neutral-600 cursor-not-allowed'}`}>
                <Download size={20} />
              </button>
            </div>
          </header>

          <main className="flex-1 w-full bg-black relative flex items-center justify-center overflow-hidden touch-none">
            {!image ? (
              <div className="flex flex-col items-center gap-4 text-neutral-600">
                <ImageIcon size={56} className="opacity-40" />
                <p className="text-sm font-medium">Ketuk ikon upload di atas</p>
              </div>
            ) : (
              <div className="relative w-full h-full select-none">
                <img src={image} alt="Edited" className="absolute inset-0 w-full h-full object-contain pointer-events-none" style={{ filter: getFilterString(filters) }} />
                <img src={image} alt="Original" className="absolute inset-0 w-full h-full object-contain pointer-events-none" style={{ clipPath: `inset(0 ${100 - splitPos}% 0 0)` }} />
                
                <div className="absolute top-0 bottom-0 w-[2px] bg-white shadow-[0_0_15px_rgba(0,0,0,0.9)] z-10 flex justify-center items-center pointer-events-none" style={{ left: `calc(${splitPos}% - 1px)` }}>
                  <div className="w-9 h-9 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center shadow-[0_4px_10px_rgba(0,0,0,0.5)] border border-neutral-200">
                    <SplitSquareHorizontal size={18} className="text-black" />
                  </div>
                </div>

                <input type="range" min="0" max="100" value={splitPos} onChange={(e) => setSplitPos(e.target.value)} className="absolute inset-0 w-full h-full opacity-0 cursor-ew-resize z-20 m-0 p-0 touch-none" />
                <div className="absolute top-3 left-3 bg-black/60 text-white text-[10px] px-2 py-1 rounded-full backdrop-blur-md pointer-events-none z-10 font-semibold tracking-wide">BEFORE</div>
                <div className="absolute top-3 right-3 bg-black/60 text-white text-[10px] px-2 py-1 rounded-full backdrop-blur-md pointer-events-none z-10 font-semibold tracking-wide">AFTER</div>
              </div>
            )}
          </main>

          <div className="w-full bg-neutral-900/98 backdrop-blur-3xl rounded-t-2xl shadow-[0_-10px_40px_rgba(0,0,0,0.8)] z-30 flex flex-col shrink-0 h-[34dvh] min-h-[260px]" style={{ paddingBottom: 'max(env(safe-area-inset-bottom), 12px)' }}>
            <div className="w-full flex justify-center pt-2.5 pb-2">
              <div className="w-10 h-1 bg-neutral-600 rounded-full"></div>
            </div>
            <div className="flex-1 overflow-y-auto px-4 pb-4 scrollbar-hide">
              <h2 className="text-xs font-bold mb-3 text-neutral-200 flex items-center gap-1.5"><Sliders size={14} className="text-blue-400"/> Filter & Tools</h2>
              
              <div className="flex gap-2 mb-4 overflow-x-auto pb-1 scrollbar-hide snap-x" style={{ opacity: image ? 1 : 0.3, pointerEvents: image ? 'auto' : 'none' }}>
                <button onClick={() => applyPreset(hdDetailPreset)} className="snap-start flex-shrink-0 px-3 py-1.5 rounded-lg border border-blue-500/40 bg-blue-900/30 text-blue-400 text-[10px] font-bold active:scale-95 transition-transform">HD Detail</button>
                <button onClick={() => applyPreset(cinematicPreset)} className="snap-start flex-shrink-0 px-3 py-1.5 rounded-lg border border-emerald-500/40 bg-emerald-900/30 text-emerald-400 text-[10px] font-bold active:scale-95 transition-transform">Cinematic</button>
                <button onClick={() => applyPreset(bwCinematicPreset)} className="snap-start flex-shrink-0 px-3 py-1.5 rounded-lg border border-zinc-400/40 bg-zinc-800/40 text-zinc-300 text-[10px] font-bold active:scale-95 transition-transform">B&W Noir</button>
                <button onClick={() => applyPreset(defaultFilters)} className="snap-start flex-shrink-0 px-3 py-1.5 rounded-lg border border-neutral-700 bg-neutral-800 text-neutral-300 text-[10px] font-bold active:scale-95 transition-transform">Reset</button>
              </div>

              <div className="space-y-4" style={{ opacity: image ? 1 : 0.3, pointerEvents: image ? 'auto' : 'none' }}>
                {['sharpen', 'brightness', 'contrast', 'saturate', 'sepia'].map(filterName => (
                  <div key={filterName} className="flex flex-col gap-1.5">
                    <div className="flex justify-between text-[10px] font-semibold">
                      <span className="text-neutral-300 capitalize">{filterName === 'sharpen' ? 'Detail & Sharpen' : filterName === 'sepia' ? 'Cinematic Tint' : filterName}</span>
                      <span className="text-neutral-400">{filters[filterName]}%</span>
                    </div>
                    <input type="range" min={filterName === 'brightness' || filterName === 'contrast' ? "50" : "0"} max={filterName === 'sepia' ? "100" : "200"} value={filters[filterName]} onChange={(e) => handleFilterChange(filterName, e.target.value)} className="w-full h-1.5 bg-neutral-800 rounded-full appearance-none cursor-pointer accent-neutral-300" />
                  </div>
                ))}
              </div>
            </div>
          </div>
          <canvas ref={canvasRef} className="hidden" />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
