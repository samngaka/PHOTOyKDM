<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Photocopy byKDM</title>
  
  <!-- Load TailwindCSS & React via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background-color: #000; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Script Aplikasi -->
  <script type="text/babel">
    const { useState, useRef } = React;
    
    // Icon SVG Components
    const Upload = ({ size = 20, className }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>);
    const Download = ({ size = 20, className }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>);
    const ImageIcon = ({ size = 56, className }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>);
    const SplitSquareHorizontal = ({ size = 18, className }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>);

    const App = () => {
      const [image, setImage] = useState(null);
      const [splitPos, setSplitPos] = useState(50);
      const canvasRef = useRef(null);

      // Parameter Hardcode untuk Auto HD Detail (Tanpa Menu)
      const hdConfig = {
        brightness: 104,
        contrast: 115,
        saturate: 110,
        sharpen: 45 // Memberikan efek tajam yang jelas tanpa noise berlebih
      };

      const filterString = `brightness(${hdConfig.brightness}%) contrast(${hdConfig.contrast}%) saturate(${hdConfig.saturate}%) url(#sharpen-filter)`;

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            setImage(event.target.result);
            setSplitPos(50); // Reset slider ke tengah
          };
          reader.readAsDataURL(file);
        }
      };

      const downloadImage = () => {
        if (!image) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.filter = filterString;
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          try {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = `photocopy_hd_${new Date().getTime()}.jpg`;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          } catch (e) {
            alert("Gagal menyimpan gambar. Pastikan browser mengizinkan unduhan.");
          }
        };
        img.src = image;
      };

      return (
        <div className="h-[100dvh] w-full bg-black text-neutral-100 font-sans flex flex-col overflow-hidden md:max-w-[430px] md:mx-auto relative md:border-x md:border-neutral-800 shadow-2xl">
          
          {/* SVG Filter untuk Penajaman HD */}
          <svg style={{ position: 'absolute', width: 0, height: 0 }} aria-hidden="true">
            <filter id="sharpen-filter">
              <feConvolveMatrix 
                order="3" 
                preserveAlpha="true" 
                kernelMatrix={`0 -${hdConfig.sharpen / 100} 0 -${hdConfig.sharpen / 100} ${1 + 4 * (hdConfig.sharpen / 100)} -${hdConfig.sharpen / 100} 0 -${hdConfig.sharpen / 100} 0`} 
              />
            </filter>
          </svg>

          {/* Header */}
          <header className="bg-neutral-900/90 backdrop-blur-md flex items-center justify-between px-5 py-3 z-20 border-b border-neutral-800/60 shrink-0" style={{ paddingTop: 'max(env(safe-area-inset-top), 16px)' }}>
            <div className="flex items-center gap-2">
              <h1 className="text-lg font-bold tracking-tight">Photocopy <span className="text-neutral-400 font-normal">byKDM</span></h1>
            </div>
            {image && (
              <label className="flex items-center justify-center bg-neutral-800 hover:bg-neutral-700 text-white text-[10px] font-bold px-3 py-1.5 rounded-full transition-colors cursor-pointer active:scale-95">
                Ganti Foto
                <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
              </label>
            )}
          </header>

          {/* Main Area */}
          <main className="flex-1 w-full bg-[#0a0a0a] relative flex items-center justify-center overflow-hidden touch-none">
            {!image ? (
              // Tampilan saat kosong
              <div className="flex flex-col items-center justify-center p-8 w-full h-full">
                <div className="bg-neutral-900/50 p-8 rounded-3xl border border-neutral-800 flex flex-col items-center gap-4 w-full max-w-xs text-center shadow-lg">
                  <ImageIcon size={64} className="text-neutral-600 mb-2" />
                  <div>
                    <h2 className="text-lg font-bold text-white mb-1">Auto HD Detail</h2>
                    <p className="text-xs text-neutral-400">Pilih foto dan aplikasi akan otomatis menjernihkan kualitasnya.</p>
                  </div>
                  <label className="mt-4 w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-colors cursor-pointer active:scale-95 shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                    <Upload size={18} />
                    Pilih Foto
                    <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                  </label>
                </div>
              </div>
            ) : (
              // Tampilan Slider Before/After
              <div className="relative w-full h-full select-none">
                {/* Gambar AFTER (HD) - Di Bawah */}
                <img 
                  src={image} 
                  alt="HD Result" 
                  className="absolute inset-0 w-full h-full object-contain pointer-events-none" 
                  style={{ filter: filterString }} 
                />
                
                {/* Gambar BEFORE (Asli) - Di Atas, dipotong */}
                <img 
                  src={image} 
                  alt="Original" 
                  className="absolute inset-0 w-full h-full object-contain pointer-events-none" 
                  style={{ clipPath: `inset(0 ${100 - splitPos}% 0 0)` }} 
                />
                
                {/* Garis Pemisah & Handle Slider */}
                <div className="absolute top-0 bottom-0 w-[2px] bg-white shadow-[0_0_10px_rgba(0,0,0,0.8)] z-10 flex justify-center items-center pointer-events-none" style={{ left: `calc(${splitPos}% - 1px)` }}>
                  <div className="w-10 h-10 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center shadow-[0_4px_12px_rgba(0,0,0,0.6)] border border-neutral-200">
                    <SplitSquareHorizontal size={20} className="text-black" />
                  </div>
                </div>

                {/* Input Slider Transparan */}
                <input 
                  type="range" min="0" max="100" 
                  value={splitPos} onChange={(e) => setSplitPos(e.target.value)} 
                  className="absolute inset-0 w-full h-full opacity-0 cursor-ew-resize z-20 m-0 p-0 touch-none" 
                />
                
                {/* Label Status */}
                <div className="absolute top-4 left-4 bg-black/70 text-white text-[10px] px-3 py-1.5 rounded-full backdrop-blur-md pointer-events-none z-10 font-bold tracking-widest border border-white/10">BEFORE</div>
                <div className="absolute top-4 right-4 bg-blue-600/90 text-white text-[10px] px-3 py-1.5 rounded-full backdrop-blur-md pointer-events-none z-10 font-bold tracking-widest shadow-[0_0_10px_rgba(37,99,235,0.5)]">AFTER HD</div>
              </div>
            )}
          </main>

          {/* Footer Bar: Tombol Simpan */}
          {image && (
            <div className="bg-neutral-900/95 backdrop-blur-xl border-t border-neutral-800 p-4 shrink-0 z-30" style={{ paddingBottom: 'max(env(safe-area-inset-bottom), 16px)' }}>
              <button 
                onClick={downloadImage}
                className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 px-6 rounded-xl transition-all active:scale-95 shadow-[0_4px_20px_rgba(37,99,235,0.4)]"
              >
                <Download size={20} />
                Simpan Foto HD
              </button>
            </div>
          )}

          {/* Canvas Tersembunyi untuk Download */}
          <canvas ref={canvasRef} className="hidden" />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
